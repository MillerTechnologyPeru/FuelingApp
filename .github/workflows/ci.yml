name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  swift-build:
    name: Build Swift Package
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build

  swift-test:
    name: Unit Tests (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test

  ios-playground:
    name: Build iOS Playground App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build Fueling.swiftpm for iOS Simulator
        working-directory: Fueling.swiftpm
        run: |
          xcodebuild build \
            -scheme Fueling \
            -destination 'generic/platform=iOS Simulator' \
            -skipMacroValidation

  android:
    name: Build Android App
    runs-on: ubuntu-latest
    env:
      SWIFT_VERSION: "6.3.3"
      NDK_VERSION: "27.2.12479018"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;${NDK_VERSION}"

      # swift-actions/setup-swift doesn't know 6.3.3 yet ("Version is not
      # available"), so install the swift.org toolchain directly.
      - name: Install Swift toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq binutils git gnupg2 libc6-dev libcurl4-openssl-dev \
            libedit2 libgcc-13-dev libpython3-dev libsqlite3-0 libstdc++-13-dev \
            libxml2-dev libz3-dev pkg-config tzdata unzip zlib1g-dev
          curl -sL "https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2404/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04.tar.gz" | tar xz -C "$HOME"
          echo "$HOME/swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04/usr/bin" >> "$GITHUB_PATH"
          "$HOME/swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04/usr/bin/swift" --version

      - name: Install Android Swift SDK
        run: |
          curl -O "https://download.swift.org/swift-${SWIFT_VERSION}-release/android-sdk/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE_android.artifactbundle.tar.gz"
          swift sdk install "swift-${SWIFT_VERSION}-RELEASE_android.artifactbundle.tar.gz"

          bundle_dir=$(dirname "$(find "$HOME" -path '*swift-sdks*swift-android/scripts/setup-android-sdk.sh' 2>/dev/null | head -n1)")
          ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" bash "$bundle_dir/setup-android-sdk.sh"

      - name: Configure local.properties
        working-directory: Android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # jdk25Home's default is a macOS Homebrew path; any JDK 17+ works for
      # swift-java's callbacks sub-build, so reuse the runner's JDK. swiftBin's
      # default is the macOS toolchain path, so point it at the PATH-installed
      # swift from the toolchain step above.
      - name: Build Android app
        working-directory: Android
        run: |
          ./gradlew :app:assembleDebug --no-daemon \
            -PswiftBin="$(command -v swift)" \
            -Pjdk25Home="$JAVA_HOME"
